name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

jobs:
  build-and-test:
    name: Build, test, coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore Commerce.sln

      - name: Build
        run: dotnet build Commerce.sln -c Release --no-restore

      - name: Verify formatting
        run: dotnet format Commerce.sln --verify-no-changes --no-restore

      - name: Unit tests
        run: >
          dotnet test tests/Commerce.UnitTests/Commerce.UnitTests.csproj
          -c Release --no-build
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage

      - name: Integration tests (Testcontainers - SQL Server + Redis Stack)
        run: >
          dotnet test tests/Commerce.IntegrationTests/Commerce.IntegrationTests.csproj
          -c Release --no-build
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: ./coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  ui-tests:
    name: UI tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build
        run: dotnet build Commerce.sln -c Release

      - name: Install Playwright browsers
        run: pwsh tests/Commerce.UiTests/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: Start API in demo mode
        run: |
          ASPNETCORE_URLS=http://localhost:5080 \
          ASPNETCORE_ENVIRONMENT=Production \
          dotnet run --project src/Commerce.Api/Commerce.Api.csproj -c Release --no-build &
          echo "Waiting for API health..."
          for i in {1..30}; do
            if curl -sf http://localhost:5080/health > /dev/null; then echo "API is up"; break; fi
            sleep 2
          done

      - name: Run UI tests
        env:
          DEMO_BASE_URL: http://localhost:5080
        run: dotnet test tests/Commerce.UiTests/Commerce.UiTests.csproj -c Release --no-build

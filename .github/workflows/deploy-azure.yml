name: Deploy to Azure

# Builds the container, pushes it to GitHub Container Registry, and rolls it out to an existing
# Azure Container App. Authentication uses OIDC federation (no stored credentials).
#
# Required GitHub configuration:
#   Secrets:   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   Variables: AZURE_RESOURCE_GROUP, AZURE_CONTAINERAPP_NAME
# Provision the Container App and dependencies first with infra/main.bicep.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        run: echo "image=${IMAGE}:${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ env.IMAGE }}:latest

  deploy:
    needs: build-push
    # Skipped (not failed) until Azure is configured: set the AZURE_CONTAINERAPP_NAME repository
    # variable plus the AZURE_* secrets (see docs/deployment.md) and this job rolls out the image.
    if: ${{ vars.AZURE_CONTAINERAPP_NAME != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App image
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --name ${{ vars.AZURE_CONTAINERAPP_NAME }} \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --image ${{ needs.build-push.outputs.image }}

  # Free alternative: deploy the demo image to Render instead of Azure.
  # Add a RENDER_DEPLOY_HOOK_URL secret and replace the jobs above with:
  #   - run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
